<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FTK | المشاريع</title>
  <link rel="stylesheet" href="navbar.css">
  <style>
    :root { --card:rgba(255,255,255,.07); --text:#fff; --muted:#c6c6d4; --brand:#e50914; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body {
      min-height:100vh; font-family:"Segoe UI", Tahoma, Geneva, Verdana, sans-serif; color:var(--text);
      padding:24px; opacity:0; transition:opacity .35s ease;
    }
    body.page-ready { opacity:1; }
    body.page-leave { opacity:0; }
    .content { min-height:100vh; display:grid; place-items:start center; padding-top:100px; padding-bottom:40px; width:100%; }
    .card {
      width:min(960px,100%); background:linear-gradient(150deg, rgba(255,255,255,.09), rgba(17,17,24,.92));
      border:1px solid rgba(255,255,255,.12); border-radius:22px; padding:clamp(24px,3vw,42px); box-shadow:0 24px 60px rgba(0,0,0,.45);
    }
    h1 { font-size:clamp(1.7rem,4vw,2.4rem); margin-bottom:10px; }
    .sub { color:var(--muted); line-height:1.8; margin-bottom:28px; font-size:1.05rem; }
    .project-grid { display:grid; grid-template-columns:1fr; gap:22px; max-width:520px; margin-inline:auto; }
    .project-card {
      background:var(--card); border:1px solid rgba(255,255,255,.12); border-radius:18px; padding:18px;
      display:flex; flex-direction:column; gap:14px; box-shadow:0 12px 32px rgba(0,0,0,.28);
    }
    .project-title { font-size:1.15rem; color:#fff; font-weight:750; text-align:center; }
    .project-thumb {
      display:block; border-radius:14px; overflow:hidden; border:1px solid rgba(255,255,255,.14);
      box-shadow:0 10px 28px rgba(0,0,0,.35); transition:transform .22s ease, box-shadow .22s ease;
    }
    .project-thumb:hover { transform:translateY(-3px); box-shadow:0 16px 36px rgba(229,9,20,.2); }
    .project-thumb:focus-visible { outline:2px solid rgba(229,9,20,.8); outline-offset:3px; }
    .project-thumb img { width:100%; height:auto; display:block; vertical-align:middle; }
    .hint { text-align:center; font-size:.88rem; color:var(--muted); }
  </style>
</head>
<body class="ftk-page">
  <header class="topbar">
    <div class="topbar-brand">FTK WEB</div>
    <div class="topbar-actions">
      <a class="nav-btn page-link" href="index.html" aria-label="الرئيسية">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8h5Z"></path></svg>
      </a>
      <a class="nav-btn page-link" href="settings.html" aria-label="الإعدادات">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M19.14 12.94a7.8 7.8 0 0 0 .05-.94 7.8 7.8 0 0 0-.05-.94l2.03-1.58a.5.5 0 0 0 .12-.64l-1.92-3.32a.5.5 0 0 0-.6-.22l-2.39.96a7.24 7.24 0 0 0-1.63-.94l-.36-2.54a.5.5 0 0 0-.5-.42h-3.84a.5.5 0 0 0-.5.42l-.36 2.54c-.58.23-1.12.54-1.63.94l-2.39-.96a.5.5 0 0 0-.6.22L2.7 8.84a.5.5 0 0 0 .12.64l2.03 1.58a7.8 7.8 0 0 0-.05.94c0 .32.02.63.05.94L2.82 14.52a.5.5 0 0 0-.12.64l1.92 3.32a.5.5 0 0 0 .6.22l2.39-.96c.51.4 1.05.71 1.63.94l.36 2.54a.5.5 0 0 0 .5.42h3.84a.5.5 0 0 0 .5-.42l.36-2.54c.58-.23 1.12-.54 1.63-.94l2.39.96a.5.5 0 0 0 .6-.22l1.92-3.32a.5.5 0 0 0-.12-.64Zm-7.14 2.56A3.5 3.5 0 1 1 12 8.5a3.5 3.5 0 0 1 0 7Z"></path></svg>
      </a>
      <a class="nav-btn page-link" href="team.html" aria-label="الفريق">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 12.5a5 5 0 1 0-5-5 5 5 0 0 0 5 5Zm0 2.5c-4.1 0-8 2-8 4.4V22h16v-2.6c0-2.4-3.9-4.4-8-4.4Z"></path></svg>
      </a>
      <a class="nav-btn page-link is-active" href="projects.html" aria-label="المشاريع" aria-current="page">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 21V11h5v2h3v-4l5-2v6h5v8H3Zm2-2h4v-5H5v5Zm6 0h4V9h-4v10zm6 0h4v-4h-4v4zM8 7V3h2v4H8zm4 0V4h2v3h-2z"></path></svg>
      </a>
    </div>
  </header>

  <main class="content" dir="rtl">
    <section class="card">
      <h1>المشاريع</h1>
      <p class="sub">مجموعة من الأعمال التي نفذتها شركة FTK — نفس هوية الموقع ونفس تجربة التنقل بين الصفحات.</p>

      <div class="project-grid">
        <article class="project-card">
          <h2 class="project-title">سيستم عيادة أونلاين</h2>
          <a class="project-thumb page-link" href="project-clinic.html" aria-label="تفاصيل مشروع عيادة دكتور أحمد وجيه">
            <img src="assets/dr-ahmed-dashboard.png" width="800" height="450" alt="لقطة من نظام عيادة دكتور أحمد وجيه">
          </a>
          <p class="hint">اضغط على الصورة لعرض التفاصيل والصور من داخل الموقع.</p>
        </article>
      </div>
    </section>
  </main>

  <script>
    requestAnimationFrame(() => document.body.classList.add("page-ready"));
    document.querySelectorAll(".page-link").forEach((link) => {
      link.addEventListener("click", (event) => {
        event.preventDefault();
        const target = link.getAttribute("href");
        document.body.classList.add("page-leave");
        setTimeout(() => { window.location.href = target; }, 260);
      });
    });
  </script>
</body>
</html>
