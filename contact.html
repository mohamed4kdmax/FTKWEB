    :root { --text:#fff; --muted:#c6c6d4; --brand:#e50914; --brand-soft:#ff3b3b; --wa:#25d366; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body {
      min-height:100vh; font-family:"Segoe UI", Tahoma, Geneva, Verdana, sans-serif; color:var(--text);
      padding:16px; opacity:0; transition:opacity .35s ease;
    }
    body.page-ready { opacity:1; }
    body.page-leave { opacity:0; }
    .wrap { width:min(520px, 100%); margin-inline:auto; }
    .card {
      background:linear-gradient(150deg, rgba(255,255,255,.09), rgba(17,17,24,.92));
      border:1px solid rgba(255,255,255,.12); border-radius:22px; padding:clamp(26px, 4vw, 40px);
      box-shadow:0 24px 60px rgba(0,0,0,.45); text-align:center;
    }
    h1 { font-size:clamp(1.45rem, 4vw, 2rem); margin-bottom:12px; line-height:1.35; }
    .sub { color:var(--muted); font-size:1.02rem; line-height:1.85; margin-bottom:28px; }
    .phone-label { font-size:.9rem; color:var(--muted); margin-bottom:8px; }
    .phone {
      display:block; font-size:clamp(1.75rem, 5vw, 2.35rem); font-weight:800; letter-spacing:.04em;
      color:#fff; text-decoration:none; margin-bottom:8px; word-break:break-all;
    }
    .phone:hover { color: var(--brand-soft); }
    .phone-hint { font-size:.85rem; color:var(--muted); margin-bottom:28px; }
    .divider { height:1px; background:rgba(255,255,255,.12); margin:8px 0 24px; }
    .wa {
      display:inline-flex; align-items:center; justify-content:center; gap:10px;
      width:100%; max-width:340px; margin-inline:auto;
      padding:14px 20px; border-radius:14px; text-decoration:none; font-weight:750; font-size:1.05rem;
      background:linear-gradient(180deg, #2fe26a, var(--wa)); color:#062d14;
      box-shadow:0 12px 32px rgba(37, 211, 102, .35); transition:transform .2s ease, box-shadow .2s ease;
    }
    .wa:hover { transform:translateY(-2px); box-shadow:0 16px 38px rgba(37, 211, 102, .45); }
    .wa svg { width:26px; height:26px; flex-shrink:0; fill:currentColor; }
    .back { display:inline-block; margin-top:22px; color:var(--muted); text-decoration:none; font-size:.95rem; }
    .back:hover { color:#fff; text-decoration:underline; }
  </style>
